version: 1
name: adops-mcp
description: "AI-powered cross-platform ad management. Manage Google Ads and Meta Ads campaigns, analyze performance, optimize budgets, detect anomalies, run A/B tests, and forecast spend."
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js
  env:
    MCPIZE: "true"
    PORT: "8080"

secrets:
  - name: GOOGLE_ADS_DEVELOPER_TOKEN
    required: false
    description: "Google Ads API developer token"
  - name: GOOGLE_ADS_CLIENT_ID
    required: false
    description: "Google Ads OAuth2 client ID"
  - name: GOOGLE_ADS_CLIENT_SECRET
    required: false
    description: "Google Ads OAuth2 client secret"
  - name: GOOGLE_ADS_REFRESH_TOKEN
    required: false
    description: "Google Ads OAuth2 refresh token"

credentials:
  - name: META_APP_ID
    required: false
    description: "Meta Marketing API App ID"
  - name: META_APP_SECRET
    required: false
    description: "Meta Marketing API App Secret"
  - name: META_ACCESS_TOKEN
    required: false
    description: "Meta system user access token"
